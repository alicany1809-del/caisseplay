<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Caisse Mobile - Fullscreen</title>
    <style>
        :root {
            --bg-app: #3498db; --sidebar: #2c3e50; --card: #34495e; --plateau: #f8f9fa;
            --m-100: #2ecc71; --m-50: #e67e22; --m-20: #3498db;
            --m-10: #e74c3c; --m-5: #95a5a6; --m-gold: #f1c40f;
            --m-bronze: #d35400; --stroke: #1a252f;
        }

        * { font-size: 1.2rem !important; font-weight: 800; box-sizing: border-box; touch-action: pan-y; }

        html, body { 
            background: var(--bg-app);
            margin: 0;
            padding: 0;
            /* Le secret : une hauteur légèrement supérieure à 100% pour autoriser le scroll qui cache l'URL */
            min-height: 105vh; 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            user-select: none; 
            color: white;
            padding: 10px;
        }

        /* Conteneur principal calé sur la taille réelle de l'écran */
        #game-container { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            height: 92vh; 
            width: 100%;
        }

        #top-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .info-card { 
            background: #ffffff; padding: 5px; border-radius: 12px; text-align: center; 
        }
        .info-card label { display: block; color: #7f8c8d; font-size: 0.7rem !important; }
        .info-card span { display: block; color: #2c3e50; font-size: 1.3rem !important; }

        #plateau-zone { 
            flex-grow: 1; background: var(--plateau); border-radius: 15px; 
            position: relative; overflow: hidden; border: 3px solid #bdc3c7;
        }

        #header-step { background: white; padding: 8px; text-align: center; color: var(--sidebar); font-size: 1rem !important; border-bottom: 2px solid #eee; }

        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .num-btn, .money-btn { 
            padding: 15px 0; border: none; border-radius: 8px; background: white; 
            color: var(--sidebar); cursor: pointer; box-shadow: 0 4px 0 #bdc3c7; 
            text-align: center;
        }
        .num-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #bdc3c7; }

        .btn-check { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-clear { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        .money-btn { border: 2px solid var(--stroke); color: white; box-shadow: 0 3px 0 var(--stroke); flex: 1; font-size: 1rem !important; }

        #drawer { display: none; padding: 5px 0; }
        .drawer-row { display: flex; gap: 5px; margin-bottom: 5px; }

        .money-item { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            border: 3px solid var(--stroke); z-index: 10; touch-action: none;
        }
        .m-billet { width: 90px; height: 45px; border-radius: 6px; }
        .m-piece { border-radius: 50%; width: 50px; height: 50px; }

        /* Couleurs */
        .c-100 { background: var(--m-100); } .c-50 { background: var(--m-50); } 
        .c-20 { background: var(--m-20); } .c-10 { background: var(--m-10); } 
        .c-5 { background: var(--m-5); } .c-gold { background: var(--m-gold); }
        .c-silver { background: #ecf0f1; border-color: #7f8c8d; } 
        .c-2e-ring { background: #ecf0f1; border: 4px solid #f1c40f !important; }
        .c-bronze { background: var(--m-bronze); color: white; }

        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; visibility: hidden; opacity: 0;
            transition: opacity 0.4s;
        }
        #overlay.show { visibility: visible; opacity: 1; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-info">
        <div class="info-card"><label>TICKET</label><span id="val-ticket">0.00</span></div>
        <div class="info-card"><label>REÇU</label><span id="val-recu">0.00</span></div>
        <div class="info-card"><label>RENDU</label><span id="val-rendre">0.00</span></div>
    </div>

    <div id="plateau-zone">
        <div id="header-step">Chargement...</div>
        <div id="money-layer"></div>
    </div>

    <div id="interactive-bottom">
        <div id="numpad">
            <button class="num-btn" onclick="press('1')">1</button>
            <button class="num-btn" onclick="press('2')">2</button>
            <button class="num-btn" onclick="press('3')">3</button>
            <button class="num-btn" onclick="press('4')">4</button>
            <button class="num-btn" onclick="press('5')">5</button>
            <button class="num-btn" onclick="press('6')">6</button>
            <button class="num-btn" onclick="press('7')">7</button>
            <button class="num-btn" onclick="press('8')">8</button>
            <button class="num-btn" onclick="press('9')">9</button>
            <button class="num-btn btn-clear" onclick="press('C')">C</button>
            <button class="num-btn" onclick="press('0')">0</button>
            <button class="num-btn btn-check" onclick="check()">OK</button>
        </div>

        <div id="drawer">
            <div class="drawer-row" id="row-b"></div>
            <div class="drawer-row" id="row-p"></div>
            <div style="display: flex; gap: 10px;">
                <button class="num-btn btn-clear" style="flex: 1;" onclick="clearPlateau()">EFFACER</button>
                <button class="num-btn btn-check" style="flex: 2;" onclick="checkFinal()">TERMINER</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 style="font-size: 2.5rem !important;">BRAVO ! 🌟</h1>
    <button class="num-btn" style="padding: 15px 40px; background:#2ecc71; color:white;" onclick="init()">CONTINUER</button>
</div>

<script>
    // --- LOGIQUE PLEIN ÉCRAN AUTOMATIQUE ---
    // Cache la barre d'adresse au premier clic/touche
    document.addEventListener('touchstart', function() {
        window.scrollTo(0, 1);
        const de = document.documentElement;
        if(de.requestFullscreen) de.requestFullscreen();
        else if(de.webkitRequestFullscreen) de.webkitRequestFullscreen();
    }, { once: true });

    const MONNAIE = [
        {v:10000, n:'100', c:'c-100', t:'m-billet'}, {v:5000, n:'50', c:'c-50', t:'m-billet'},
        {v:2000, n:'20', c:'c-20', t:'m-billet'}, {v:1000, n:'10', c:'c-10', t:'m-billet'},
        {v:500, n:'5', c:'c-5', t:'m-billet'}, {v:200, n:'2€', c:'c-2e-ring', t:'m-piece'},
        {v:100, n:'1€', c:'c-silver', t:'m-piece'}, {v:50, n:'50c', c:'c-gold', t:'m-piece'},
        {v:20, n:'20c', c:'c-gold', t:'m-piece'}, {v:10, n:'10c', c:'c-gold', t:'m-piece'},
        {v:5, n:'5c', c:'c-bronze', t:'m-piece'}, {v:2, n:'2c', c:'c-bronze', t:'m-piece'},
        {v:1, n:'1c', c:'c-bronze', t:'m-piece'}
    ];
    let game = { step: 1, ticket: 0, received: 0, input: "", userRendu: 0 };

    function buildDrawer() {
        document.getElementById('row-b').innerHTML = ""; document.getElementById('row-p').innerHTML = "";
        MONNAIE.forEach(m => {
            const btn = document.createElement('button');
            btn.className = `money-btn ${m.c}`; btn.innerText = m.n;
            btn.onclick = () => { if(game.step === 4) { game.userRendu += m.v; spawn(m); update(); } };
            document.getElementById(m.t === 'm-billet' ? 'row-b' : 'row-p').appendChild(btn);
        });
    }

    function init() {
        game = { step: 2, ticket: Math.floor(Math.random() * 3000) + 500, received: 0, input: "", userRendu: 0 };
        document.getElementById('money-layer').innerHTML = "";
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('numpad').style.display = "grid";
        document.getElementById('drawer').style.display = "none";
        document.getElementById('header-step').innerText = "Combien a-t-on reçu ?";
        
        let target = game.ticket + (Math.floor(Math.random() * 2000));
        let s = 0; while(s < target) { let m = MONNAIE[Math.floor(Math.random() * 5) + 3]; s += m.v; spawn(m); }
        game.received = s; update();
    }

    function spawn(m) {
        const d = document.createElement('div');
        d.className = `money-item ${m.t} ${m.c}`; d.innerText = m.n; 
        d.style.left = (Math.random() * 60 + 5) + "%"; d.style.top = (Math.random() * 50 + 20) + "%";
        
        d.ontouchstart = (e) => {
            let touch = e.touches[0];
            let shiftX = touch.clientX - d.getBoundingClientRect().left;
            let shiftY = touch.clientY - d.getBoundingClientRect().top;
            d.style.zIndex = 1000;
            
            d.ontouchmove = (ev) => {
                let t = ev.touches[0];
                let rect = document.getElementById('plateau-zone').getBoundingClientRect();
                let x = t.clientX - rect.left - shiftX;
                let y = t.clientY - rect.top - shiftY;
                x = Math.max(0, Math.min(x, rect.width - d.offsetWidth));
                y = Math.max(40, Math.min(y, rect.height - d.offsetHeight));
                d.style.left = x + 'px'; d.style.top = y + 'px';
            };
            d.ontouchend = () => { d.ontouchmove = null; d.style.zIndex = 10; };
        };
        document.getElementById('money-layer').appendChild(d);
    }

    function press(v) { if(v==='C') game.input = ""; else if(game.input.length < 6) game.input += v; update(); }
    function update() { 
        document.getElementById('val-ticket').innerText = (game.ticket/100).toFixed(2); 
        document.getElementById('val-recu').innerText = (parseInt(game.input||0)/100).toFixed(2); 
        document.getElementById('val-rendre').innerText = (game.step >= 4) ? (game.userRendu/100).toFixed(2) : "0.00";
    }

    function check() {
        if(parseInt(game.input) === game.received) { 
            game.step = 4;
            document.getElementById('header-step').innerText = "Rendez la monnaie !";
            document.getElementById('money-layer').innerHTML = "";
            document.getElementById('numpad').style.display = "none";
            document.getElementById('drawer').style.display = "block";
        } else feedback(false);
    }

    function checkFinal() { 
        if(game.userRendu === (game.received - game.ticket)) {
            document.getElementById('overlay').classList.add('show');
        } else feedback(false);
    }

    function clearPlateau() { document.getElementById('money-layer').innerHTML = ""; game.userRendu = 0; update(); }

    function feedback(win) {
        const p = document.getElementById('plateau-zone');
        p.classList.add('shake');
        p.style.backgroundColor = win ? '#2ecc71' : '#e74c3c';
        setTimeout(() => { p.classList.remove('shake'); p.style.backgroundColor = 'var(--plateau)'; }, 400);
    }

    buildDrawer(); init();
</script>
</body>
  </html>
