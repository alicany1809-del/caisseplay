
  
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Caisse Mobile</title>
    <style>
        :root {
            --bg-app: #3498db; --sidebar: #2c3e50; --card: #34495e; --plateau: #f8f9fa;
            --m-100: #2ecc71; --m-50: #e67e22; --m-20: #3498db;
            --m-10: #e74c3c; --m-5: #95a5a6; --m-gold: #f1c40f;
            --m-bronze: #d35400; --stroke: #1a252f;
        }

        * { font-size: 1.2rem !important; font-weight: 800; box-sizing: border-box; touch-action: manipulation; }

        /* Modifié pour permettre le scroll qui cache la barre d'URL */
        html, body { min-height: 105vh; background: var(--bg-app); margin: 0; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: calc(15px + env(safe-area-inset-top)) 10px 10px 10px; 
            display: flex; flex-direction: column; user-select: none; color: white; 
        }

        #game-container { display: flex; flex-direction: column; gap: 10px; height: 95vh; }
        #top-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .info-card { 
            background: #ffffff; padding: 5px; border-radius: 12px; text-align: center; 
            transition: all 0.3s ease;
        }
        .info-card label { display: block; color: #7f8c8d; font-size: 0.7rem !important; }
        .info-card span { display: block; color: #2c3e50; font-size: 1.3rem !important; }

        #plateau-zone { 
            flex-grow: 1; background: var(--plateau); border-radius: 15px; 
            position: relative; overflow: hidden; border: 3px solid #bdc3c7;
            transition: border-color 0.3s;
        }

        /* --- TES ANIMATIONS D'ORIGINE --- */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .shake { animation: shake 0.4s ease-in-out; }
        .pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #header-step { background: white; padding: 8px; text-align: center; color: var(--sidebar); font-size: 1rem !important; border-bottom: 2px solid #eee; }

        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; animation: slideUp 0.5s ease; }

        .num-btn, .money-btn { 
            padding: 12px 0; border: none; border-radius: 8px; background: white; 
            color: var(--sidebar); cursor: pointer; box-shadow: 0 4px 0 #bdc3c7; 
            position: relative; top: 0; text-align: center; transition: transform 0.1s;
        }
        .num-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #bdc3c7; }

        .btn-check { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-clear { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        .money-btn { border: 2px solid var(--stroke); color: white; box-shadow: 0 3px 0 var(--stroke); flex: 1; }

        #drawer { display: none; padding: 5px 0; animation: slideUp 0.5s ease; }
        .drawer-row { display: flex; gap: 5px; margin-bottom: 5px; }

        .money-item { 
            position: absolute; cursor: grab; display: flex; 
            align-items: center; justify-content: center; 
            border: 3px solid var(--stroke); z-index: 10;
            touch-action: none;
        }
        .m-billet { width: 100px; height: 50px; border-radius: 8px; }
        .m-piece { border-radius: 50%; color: var(--stroke); width: 55px; height: 55px; }

        /* Couleurs monnaie */
        .c-100 { background: var(--m-100); } .c-50 { background: var(--m-50); } 
        .c-20 { background: var(--m-20); } .c-10 { background: var(--m-10); } 
        .c-5 { background: var(--m-5); } .c-gold { background: var(--m-gold); }
        .c-silver { background: #ecf0f1; border-color: #7f8c8d; } 
        .c-2e-ring { background: #ecf0f1; border: 4px solid #f1c40f !important; }
        .c-bronze { background: var(--m-bronze); color: white; }

        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; visibility: hidden; opacity: 0;
            transition: opacity 0.4s;
        }
        #overlay.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-info">
        <div class="info-card" id="card-payer"><label>A PAYER</label><span id="val-ticket">0.00</span></div>
        <div class="info-card" id="card-recu"><label>REÇU</label><span id="val-recu">0.00</span></div>
        <div class="info-card" id="card-rendre"><label>A RENDRE</label><span id="val-rendre">0.00</span></div>
    </div>

    <div id="plateau-zone">
        <div id="header-step">Chargement...</div>
        <div id="money-layer"></div>
    </div>

    <div id="interactive-bottom">
        <div id="numpad">
            <button class="num-btn" onclick="press('1')">1</button>
            <button class="num-btn" onclick="press('2')">2</button>
            <button class="num-btn" onclick="press('3')">3</button>
            <button class="num-btn" onclick="press('4')">4</button>
            <button class="num-btn" onclick="press('5')">5</button>
            <button class="num-btn" onclick="press('6')">6</button>
            <button class="num-btn" onclick="press('7')">7</button>
            <button class="num-btn" onclick="press('8')">8</button>
            <button class="num-btn" onclick="press('9')">9</button>
            <button class="num-btn btn-clear" onclick="press('C')">C</button>
            <button class="num-btn" onclick="press('0')">0</button>
            <button class="num-btn btn-check" onclick="check()">OK</button>
        </div>

        <div id="drawer">
            <div class="drawer-row" id="row-b"></div>
            <div class="drawer-row" id="row-p"></div>
            <div style="display: flex; gap: 10px;">
                <button class="num-btn btn-clear" style="flex: 1; margin-top:10px" onclick="clearPlateau()">EFFACER</button>
                <button class="num-btn btn-check" style="flex: 2; margin-top:10px" onclick="checkFinal()">TERMINER</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 style="font-size: 3rem !important; margin-bottom: 20px;">BRAVO ! 🌟</h1>
    <button class="num-btn" style="padding: 20px 50px; background:#2ecc71; color:white; font-size: 1.5rem !important;" onclick="init()">JEU SUIVANT</button>
</div>

<script>
    // --- SCRIPT PLEIN ECRAN AUTO ---
    window.onload = function() { setTimeout(() => window.scrollTo(0, 1), 100); };
    document.addEventListener('touchstart', () => {
        let de = document.documentElement;
        if(de.requestFullscreen) de.requestFullscreen();
        else if(de.webkitRequestFullscreen) de.webkitRequestFullscreen();
    }, { once: true });

    const MONNAIE = [
        {v:10000, n:'100€', c:'c-100', t:'m-billet'}, {v:5000, n:'50€', c:'c-50', t:'m-billet'},
        {v:2000, n:'20€', c:'c-20', t:'m-billet'}, {v:1000, n:'10€', c:'c-10', t:'m-billet'},
        {v:500, n:'5€', c:'c-5', t:'m-billet'}, {v:200, n:'2€', c:'c-2e-ring', t:'m-piece'},
        {v:100, n:'1€', c:'c-silver', t:'m-piece'}, {v:50, n:'50c', c:'c-gold', t:'m-piece'},
        {v:20, n:'20c', c:'c-gold', t:'m-piece'}, {v:10, n:'10c', c:'c-gold', t:'m-piece'},
        {v:5, n:'5c', c:'c-bronze', t:'m-piece'}, {v:2, n:'2c', c:'c-bronze', t:'m-piece'},
        {v:1, n:'1c', c:'c-bronze', t:'m-piece'}
    ];
    let game = { step: 1, ticket: 0, received: 0, input: "", userRendu: 0 };

    function buildDrawer() {
        document.getElementById('row-b').innerHTML = "";
        document.getElementById('row-p').innerHTML = "";
        MONNAIE.forEach(m => {
            const btn = document.createElement('button');
            btn.className = `money-btn ${m.c.split(' ')[0]}`;
            btn.innerText = m.n;
            btn.onclick = () => { if(game.step === 4) addRendu(m); };
            document.getElementById(m.t === 'm-billet' ? 'row-b' : 'row-p').appendChild(btn);
        });
    }

    function init() {
        game = { step: 2, ticket: Math.floor(Math.random() * 4000) + 200, received: 0, input: "", userRendu: 0 };
        document.getElementById('money-layer').innerHTML = "";
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('numpad').style.display = "grid";
        document.getElementById('drawer').style.display = "none";
        document.getElementById('header-step').innerText = "Combien a-t-on reçu ?";
        let s = 0; while(s < game.ticket) { let m = MONNAIE[Math.floor(Math.random() * 5) + 3]; s += m.v; spawn(m, false); }
        game.received = s; update();
    }

    function clearPlateau() {
        document.getElementById('money-layer').innerHTML = "";
        game.userRendu = 0;
        update();
    }

    function spawn(m, isUser) {
        const d = document.createElement('div');
        d.className = `money-item ${m.t} ${m.c} pop`;
        d.innerText = m.n; 
        d.style.left = (Math.random() * 50 + 10) + "%";
        d.style.top = (Math.random() * 30 + 20) + "%";

        const handleStart = (e) => {
            const rect = document.getElementById('plateau-zone').getBoundingClientRect();
            const touch = e.type.includes('touch') ? e.touches[0] : e;
            let sx = touch.clientX - d.getBoundingClientRect().left;
            let sy = touch.clientY - d.getBoundingClientRect().top;
            d.style.zIndex = 100;

            const handleMove = (ev) => {
                const t = ev.type.includes('touch') ? ev.touches[0] : ev;
                let x = t.clientX - rect.left - sx;
                let y = t.clientY - rect.top - sy;
                x = Math.max(0, Math.min(x, rect.width - d.offsetWidth));
                y = Math.max(40, Math.min(y, rect.height - d.offsetHeight));
                d.style.left = x + 'px';
                d.style.top = y + 'px';
            };

            const handleEnd = () => {
                d.style.zIndex = 10;
                document.removeEventListener('mousemove', handleMove);
                document.removeEventListener('touchmove', handleMove);
            };

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove, {passive: false});
            document.addEventListener('mouseup', handleEnd, {once: true});
            document.addEventListener('touchend', handleEnd, {once: true});
        };

        d.addEventListener('mousedown', handleStart);
        d.addEventListener('touchstart', handleStart, {passive: false});
        document.getElementById('money-layer').appendChild(d);
    }

    function press(v) { if(v === 'C') game.input = ""; else if(game.input.length < 6) game.input += v; update(); }
    
    function update() { 
        document.getElementById('val-ticket').innerText = (game.ticket/100).toFixed(2); 
        document.getElementById('val-recu').innerText = (parseInt(game.input||0)/100).toFixed(2); 
        document.getElementById('val-rendre').innerText = (game.step >= 4) ? ((game.received-game.ticket)/100).toFixed(2) : "0.00";
    }

    function check() {
        if(parseInt(game.input) === game.received) { 
            game.step = 4;
            document.getElementById('header-step').innerText = "Rendez la monnaie !";
            document.getElementById('money-layer').innerHTML = "";
            document.getElementById('numpad').style.display = "none";
            document.getElementById('drawer').style.display = "block";
            update();
            a();
        } else { errorEffect(); }
    }

    function checkFinal() { 
        if(Math.round(game.userRendu) === (game.received - game.ticket)) {
            document.getElementById('overlay').classList.add('show');
            a();
        } else { errorEffect(); } 
    }

    function errorEffect() { 
        const p = document.getElementById('plateau-zone'); 
        p.classList.add('shake');
        p.style.borderColor = '#e74c3c'; 
        p.style.backgroundColor = '#e74c3c'; 
        setTimeout(() => {
            p.style.backgroundColor = '#f8f9fa'; 
            p.classList.remove('shake');
            p.style.borderColor='#bdc3c7';
        }, 600); 
    }
    function a() { 
        const p = document.getElementById('plateau-zone'); 
        p.classList.add('shake');
        p.style.borderColor = '#2ecc71'; 
        p.style.backgroundColor = '#2ecc71'; 
        setTimeout(() => {
            p.style.backgroundColor = '#f8f9fa'; 
            p.classList.remove('shake');
            p.style.borderColor='#bdc3c7';
        }, 600); 
    }

    function addRendu(m) { game.userRendu += m.v; spawn(m, true); }
    buildDrawer(); init();
</script>
</body>
</html>
