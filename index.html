<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse Mobile</title>
    <style>
        :root {
            --bg-app: #3498db; --sidebar: #2c3e50; --card: #34495e; --plateau: #f8f9fa;
            --m-100: #2ecc71; --m-50: #e67e22; --m-20: #3498db;
            --m-10: #e74c3c; --m-5: #95a5a6; --m-gold: #f1c40f;
            --m-bronze: #d35400; --stroke: #1a252f;
        }
        * { font-size: 1.2rem !important; font-weight: 800; box-sizing: border-box; touch-action: manipulation; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-app); }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; padding: 10px; color: white; position: relative; }
        #game-container { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        #top-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; flex-shrink: 0; padding-right: 45px; }
        .info-card { background: #ffffff; padding: 5px; border-radius: 12px; text-align: center; }
        .info-card label { display: block; color: #7f8c8d; font-size: 0.7rem !important; }
        .info-card span { display: block; color: #2c3e50; font-size: 1.2rem !important; }
        #plateau-zone { flex-grow: 1; background: var(--plateau); border-radius: 15px; position: relative; overflow: hidden; border: 3px solid #bdc3c7; }
        #header-step { background: white; padding: 6px; text-align: center; color: var(--sidebar); font-size: 1rem !important; border-bottom: 2px solid #eee; }
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn, .money-btn { padding: 12px 0; border: none; border-radius: 8px; background: white; color: var(--sidebar); cursor: pointer; box-shadow: 0 4px 0 #bdc3c7; position: relative; }
        .num-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #bdc3c7; }
        .btn-check { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-clear { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        #drawer { display: none; padding: 5px 0; }
        .drawer-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .money-btn { border: 2px solid var(--stroke); color: white; box-shadow: 0 3px 0 var(--stroke); flex: 1; }
        .money-item { position: absolute; display: flex; align-items: center; justify-content: center; border: 3px solid var(--stroke); z-index: 10; touch-action: none; }
        .m-billet { width: 90px; height: 45px; border-radius: 8px; }
        .m-piece { border-radius: 50%; color: var(--stroke); width: 50px; height: 50px; }
        .c-100 { background: var(--m-100); } .c-50 { background: var(--m-50); } .c-20 { background: var(--m-20); } 
        .c-10 { background: var(--m-10); } .c-5 { background: var(--m-5); } .c-gold { background: var(--m-gold); }
        .c-silver { background: #ecf0f1; border-color: #7f8c8d; } .c-2e-ring { background: #ecf0f1; border: 4px solid #f1c40f !important; }
        .c-bronze { background: var(--m-bronze); color: white; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s ease; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: opacity 0.4s; }
        #overlay.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<button onclick="init()" style="position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(255,255,255,0.3); border: none; border-radius: 50%; width: 45px; height: 45px; color: white; font-size: 1.5rem !important; display: flex; align-items: center; justify-content: center;">🔄</button>

<div id="game-container">
    <div id="top-info">
        <div class="info-card"><label>A PAYER</label><span id="val-ticket">0.00</span></div>
        <div class="info-card"><label>REÇU</label><span id="val-recu">0.00</span></div>
        <div class="info-card"><label>A RENDRE</label><span id="val-rendre">0.00</span></div>
    </div>

    <div id="plateau-zone">
        <div id="header-step">Chargement...</div>
        <div id="money-layer"></div>
    </div>

    <div id="interactive-bottom">
        <div id="numpad">
            <button class="num-btn" onclick="press('1')">1</button>
            <button class="num-btn" onclick="press('2')">2</button>
            <button class="num-btn" onclick="press('3')">3</button>
            <button class="num-btn" onclick="press('4')">4</button>
            <button class="num-btn" onclick="press('5')">5</button>
            <button class="num-btn" onclick="press('6')">6</button>
            <button class="num-btn" onclick="press('7')">7</button>
            <button class="num-btn" onclick="press('8')">8</button>
            <button class="num-btn" onclick="press('9')">9</button>
            <button class="num-btn btn-clear" onclick="press('C')">C</button>
            <button class="num-btn" onclick="press('0')">0</button>
            <button class="num-btn btn-check" onclick="check()">OK</button>
        </div>

        <div id="drawer">
            <div class="drawer-row" id="row-b"></div>
            <div class="drawer-row" id="row-p"></div>
            <div style="display: flex; gap: 10px; margin-top:5px">
                <button class="num-btn btn-clear" style="flex: 1;" onclick="clearPlateau()">EFFACER</button>
                <button class="num-btn btn-check" style="flex: 2;" onclick="checkFinal()">TERMINER</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 style="color:white; margin-bottom:20px">BRAVO ! 🌟</h1>
    <button class="num-btn" style="padding: 15px 40px; background:#2ecc71; color:white" onclick="init()">JEU SUIVANT</button>
</div>

<script>
    const MONNAIE = [
        {v:10000, n:'100€', c:'c-100', t:'m-billet'}, {v:5000, n:'50€', c:'c-50', t:'m-billet'},
        {v:2000, n:'20€', c:'c-20', t:'m-billet'}, {v:1000, n:'10€', c:'c-10', t:'m-billet'},
        {v:500, n:'5€', c:'c-5', t:'m-billet'}, {v:200, n:'2€', c:'c-2e-ring', t:'m-piece'},
        {v:100, n:'1€', c:'c-silver', t:'m-piece'}, {v:50, n:'50c', c:'c-gold', t:'m-piece'},
        {v:20, n:'20c', c:'c-gold', t:'m-piece'}, {v:10, n:'10c', c:'c-gold', t:'m-piece'},
        {v:5, n:'5c', c:'c-bronze', t:'m-piece'}, {v:2, n:'2c', c:'c-bronze', t:'m-piece'},
        {v:1, n:'1c', c:'c-bronze', t:'m-piece'}
    ];
    let game = { step: 1, ticket: 0, received: 0, input: "", userRendu: 0 };

    function buildDrawer() {
        document.getElementById('row-b').innerHTML = ""; document.getElementById('row-p').innerHTML = "";
        MONNAIE.forEach(m => {
            const btn = document.createElement('button');
            btn.className = `money-btn ${m.c}`; btn.innerText = m.n;
            btn.onclick = () => { if(game.step === 4) addRendu(m); };
            document.getElementById(m.t === 'm-billet' ? 'row-b' : 'row-p').appendChild(btn);
        });
    }

    function init() {
        game = { step: 2, ticket: Math.floor(Math.random() * 4000) + 200, received: 0, input: "", userRendu: 0 };
        document.getElementById('money-layer').innerHTML = "";
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('numpad').style.display = "grid";
        document.getElementById('drawer').style.display = "none";
        document.getElementById('header-step').innerText = "Combien a-t-on reçu ?";
        let s = 0; while(s < game.ticket) { let m = MONNAIE[Math.floor(Math.random() * 5) + 3]; s += m.v; spawn(m); }
        game.received = s; update();
    }

    function spawn(m) {
        const d = document.createElement('div');
        d.className = `money-item ${m.t} ${m.c}`; d.innerText = m.n; 
        d.style.left = (Math.random() * 50 + 10) + "%"; d.style.top = (Math.random() * 30 + 20) + "%";
        
        const handleStart = (e) => {
            const rect = document.getElementById('plateau-zone').getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            let sx = touch.clientX - d.getBoundingClientRect().left;
            let sy = touch.clientY - d.getBoundingClientRect().top;
            const handleMove = (ev) => {
                const t = ev.touches ? ev.touches[0] : ev;
                let x = t.clientX - rect.left - sx;
                let y = t.clientY - rect.top - sy;
                x = Math.max(0, Math.min(x, rect.width - d.offsetWidth));
                y = Math.max(35, Math.min(y, rect.height - d.offsetHeight));
                d.style.left = x + 'px'; d.style.top = y + 'px';
            };
            const handleEnd = () => { document.removeEventListener('mousemove', handleMove); document.removeEventListener('touchmove', handleMove); };
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove, {passive: false});
            document.addEventListener('mouseup', handleEnd, {once: true});
            document.addEventListener('touchend', handleEnd, {once: true});
        };
        d.addEventListener('mousedown', handleStart); d.addEventListener('touchstart', handleStart, {passive: false});
        document.getElementById('money-layer').appendChild(d);
    }

    function press(v) { if(v === 'C') game.input = ""; else if(game.input.length < 6) game.input += v; update(); }
    
    function update() { 
        document.getElementById('val-ticket').innerText = (game.ticket/100).toFixed(2); 
        document.getElementById('val-recu').innerText = (parseInt(game.input||0)/100).toFixed(2); 
        // Affiche ce qui RESTE à rendre quand on est à l'étape du rendu
        let aRendre = (game.received - game.ticket);
        document.getElementById('val-rendre').innerText = (game.step >= 4) ? ((aRendre - game.userRendu)/100).toFixed(2) : "0.00";
    }

    function check() {
        if(parseInt(game.input) === game.received) { 
            game.step = 4;
            document.getElementById('header-step').innerText = "Rendez la monnaie !";
            document.getElementById('money-layer').innerHTML = "";
            document.getElementById('numpad').style.display = "none";
            document.getElementById('drawer').style.display = "block";
            update(); feedback(true);
        } else feedback(false);
    }

    function checkFinal() { 
        if(Math.round(game.userRendu) === (game.received - game.ticket)) {
            document.getElementById('overlay').classList.add('show');
            feedback(true);
        } else feedback(false);
    }

    function feedback(win) {
        const p = document.getElementById('plateau-zone'); 
        p.classList.add('shake');
        p.style.backgroundColor = win ? '#2ecc71' : '#e74c3c';
        setTimeout(() => { p.classList.remove('shake'); p.style.backgroundColor = 'var(--plateau)'; }, 500); 
    }

    function clearPlateau() { 
        document.getElementById('money-layer').innerHTML = ""; 
        game.userRendu = 0; 
        update(); 
    }
    
    function addRendu(m) { game.userRendu += m.v; spawn(m); update(); }
    
    buildDrawer(); init();
</script>
</body>
</html>
