<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse Hyper-Réaliste 0.50-350€</title>
    <style>
        :root {
            --bg-app: #3498db; --sidebar: #2c3e50; --plateau: #f8f9fa;
            --m-200: #f1c40f; --m-100: #2ecc71; --m-50: #e67e22; --m-20: #3498db;
            --m-10: #e74c3c; --m-5: #95a5a6; --m-gold: #f1c40f;
            --m-bronze: #d35400; --stroke: #1a252f;
        }
        * { font-size: 1.2rem !important; font-weight: 800; box-sizing: border-box; touch-action: manipulation; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-app); font-family: sans-serif; }
        #game-container { display: flex; flex-direction: column; gap: 8px; height: 100%; padding: 10px; }
        
        #top-info { display: grid; grid-template-columns: repeat(3, 1fr) 60px; gap: 8px; }
        .info-card { background: white; padding: 5px; border-radius: 12px; text-align: center; color: #2c3e50; }
        .info-card label { display: block; color: #7f8c8d; font-size: 0.6rem !important; text-transform: uppercase; }
        
        .btn-reset { background: #9b59b6; color: white; border: none; border-radius: 12px; box-shadow: 0 4px 0 #8e44ad; cursor: pointer; }

        #plateau-zone { flex-grow: 1; background: var(--plateau); border-radius: 15px; position: relative; border: 3px solid #bdc3c7; overflow: hidden; }
        #header-step { background: rgba(255,255,255,0.9); padding: 8px; text-align: center; color: var(--sidebar); border-bottom: 2px solid #eee; position: absolute; width: 100%; z-index: 20; }
        
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn, .money-btn { padding: 15px 0; border: none; border-radius: 8px; background: white; color: var(--sidebar); box-shadow: 0 4px 0 #bdc3c7; }
        .btn-check { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-clear { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        
        #drawer { display: none; }
        .drawer-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .money-btn { flex: 1; border: 2px solid var(--stroke); color: white; font-size: 0.7rem !important; padding: 10px 0; }
        
        .money-item { position: absolute; display: flex; align-items: center; justify-content: center; border: 3px solid var(--stroke); z-index: 10; transition: transform 0.1s; }
        .m-billet { width: 90px; height: 45px; border-radius: 6px; }
        .m-piece { width: 50px; height: 50px; border-radius: 50%; color: var(--stroke); }
        
        .c-200 { background: #fef5d4; border-color: #f1c40f !important; color: #b8860b; }
        .c-100 { background: var(--m-100); } .c-50 { background: var(--m-50); } .c-20 { background: var(--m-20); } 
        .c-10 { background: var(--m-10); } .c-5 { background: var(--m-5); } .c-gold { background: var(--m-gold); }
        .c-silver { background: #ecf0f1; } .c-2e-ring { background: #ecf0f1; border: 4px solid #f1c40f !important; }
        .c-bronze { background: var(--m-bronze); color: white; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-info">
        <div class="info-card"><label>A PAYER</label><span id="val-ticket">0.00</span></div>
        <div class="info-card"><label>REÇU</label><span id="val-recu">0.00</span></div>
        <div class="info-card"><label>RENDU</label><span id="val-rendre">0.00</span></div>
        <button class="btn-reset" onclick="init()">&#10227;</button>
    </div>

    <div id="plateau-zone">
        <div id="header-step">...</div>
        <div id="money-layer"></div>
    </div>

    <div id="interactive">
        <div id="numpad">
            <button class="num-btn" onclick="press('1')">1</button>
            <button class="num-btn" onclick="press('2')">2</button>
            <button class="num-btn" onclick="press('3')">3</button>
            <button class="num-btn" onclick="press('4')">4</button>
            <button class="num-btn" onclick="press('5')">5</button>
            <button class="num-btn" onclick="press('6')">6</button>
            <button class="num-btn" onclick="press('7')">7</button>
            <button class="num-btn" onclick="press('8')">8</button>
            <button class="num-btn" onclick="press('9')">9</button>
            <button class="num-btn btn-clear" onclick="press('C')">C</button>
            <button class="num-btn" onclick="press('0')">0</button>
            <button class="num-btn btn-check" onclick="checkRecu()">OK</button>
        </div>

        <div id="drawer">
            <div class="drawer-row" id="row-b1"></div>
            <div class="drawer-row" id="row-b2"></div>
            <div class="drawer-row" id="row-p"></div>
            <div style="display:flex; gap:8px">
                <button class="num-btn btn-clear" style="flex:1" onclick="clearPlateau()">EFFACER</button>
                <button class="num-btn btn-check" style="flex:2" onclick="checkFinal()">TERMINER</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 style="color:white">BIEN JOUÉ ! ✅</h1>
    <button class="num-btn" style="padding:15px 50px" onclick="init()">CLIENT SUIVANT</button>
</div>

<script>
    const MONNAIE = [
        {v:20000, n:'200€', c:'c-200', t:'m-billet'}, {v:10000, n:'100€', c:'c-100', t:'m-billet'}, 
        {v:5000, n:'50€', c:'c-50', t:'m-billet'}, {v:2000, n:'20€', c:'c-20', t:'m-billet'}, 
        {v:1000, n:'10€', c:'c-10', t:'m-billet'}, {v:500, n:'5€', c:'c-5', t:'m-billet'}, 
        {v:200, n:'2€', c:'c-2e-ring', t:'m-piece'}, {v:100, n:'1€', c:'c-silver', t:'m-piece'}, 
        {v:50, n:'50c', c:'c-gold', t:'m-piece'}, {v:20, n:'20c', c:'c-gold', t:'m-piece'}, 
        {v:10, n:'10c', c:'c-gold', t:'m-piece'}, {v:5, n:'5c', c:'c-bronze', t:'m-piece'}, 
        {v:2, n:'2c', c:'c-bronze', t:'m-piece'}, {v:1, n:'1c', c:'c-bronze', t:'m-piece'}
    ];

    let game = { ticket: 0, received: 0, input: "", userRendu: 0, step: 1 };

    function init() {
        // PRIX ENTRE 0.50€ et 350.00€
        game = { step: 1, ticket: Math.floor(Math.random() * 34951) + 50, received: 0, input: "", userRendu: 0 };
        document.getElementById('money-layer').innerHTML = "";
        document.getElementById('overlay').style.display = "none";
        document.getElementById('numpad').style.display = "grid";
        document.getElementById('drawer').style.display = "none";
        document.getElementById('header-step').innerText = "Comptez l'argent du client...";
        
        genererPaiementClient();
        updateUI();
    }

    function genererPaiementClient() {
        let s = 0; let objets = [];
        const centimes = game.ticket % 100;
        const rand = Math.random();

        // 1. Paiement par billets (Le client donne ce qu'il faut)
        if (rand < 0.6) {
            while (s < game.ticket) {
                let billet = MONNAIE.filter(m => m.t === 'm-billet').find(m => m.v >= (game.ticket - s));
                if(!billet) billet = MONNAIE[0];
                objets.push(billet); s += billet.v;
                if(s >= game.ticket) break;
            }
        } 
        // 2. L'appoint (Plusieurs billets + centimes pile)
        else {
            let cibleBillet = game.ticket - centimes;
            let currentS = 0;
            while(currentS < cibleBillet) {
                let b = MONNAIE.filter(m => m.t === 'm-billet' && m.v <= 10000)[Math.floor(Math.random()*4)+1];
                objets.push(b); currentS += b.v;
            }
            s = currentS;
            let reste = centimes;
            while(reste > 0) {
                let p = MONNAIE.find(m => m.v <= reste && m.t === 'm-piece');
                objets.push(p); s += p.v; reste -= p.v;
            }
        }

        // Toujours ajouter 1-3 pièces de "fond de poche" pour le réalisme
        for(let i=0; i < Math.floor(Math.random()*3)+1; i++) {
            let p = MONNAIE[Math.floor(Math.random()*4)+10];
            s += p.v; objets.push(p);
        }

        game.received = s;
        objets.forEach(m => spawn(m));
    }

    function spawn(m) {
        const d = document.createElement('div');
        d.className = `money-item ${m.t} ${m.c}`; d.innerText = m.n;
        d.style.left = (Math.random() * 65 + 5) + "%"; d.style.top = (Math.random() * 55 + 15) + "%";
        d.onmousedown = d.ontouchstart = (e) => {
            d.style.zIndex = 1000;
            const move = (ev) => {
                const t = ev.touches ? ev.touches[0] : ev;
                d.style.left = (t.clientX - 45) + "px"; d.style.top = (t.clientY - 25) + "px";
            };
            document.onmousemove = document.ontouchmove = move;
            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                d.style.zIndex = 10;
            }
        };
        document.getElementById('money-layer').appendChild(d);
    }

    function press(v) { if(v === 'C') game.input = ""; else if(game.input.length < 7) game.input += v; updateUI(); }

    function updateUI() {
        document.getElementById('val-ticket').innerText = (game.ticket/100).toFixed(2);
        document.getElementById('val-recu').innerText = (parseInt(game.input||0)/100).toFixed(2);
        document.getElementById('val-rendre').innerText = game.step === 2 ? ((game.received - game.ticket)/100).toFixed(2) : "0.00";
    }

    function checkRecu() {
        if(parseInt(game.input) === game.received) {
            game.step = 2;
            document.getElementById('header-step').innerText = "Rendez la monnaie exacte !";
            document.getElementById('money-layer').innerHTML = "";
            document.getElementById('numpad').style.display = "none";
            document.getElementById('drawer').style.display = "block";
            updateUI();
        } else feedback(false);
    }

    function checkFinal() {
        if(Math.round(game.userRendu) === (game.received - game.ticket)) {
            document.getElementById('overlay').style.display = "flex";
        } else feedback(false);
    }

    function feedback(win) {
        const p = document.getElementById('plateau-zone');
        p.classList.add('shake'); p.style.background = win ? '#2ecc71' : '#e74c3c';
        setTimeout(() => { p.classList.remove('shake'); p.style.background = 'var(--plateau)'; }, 500);
    }

    function clearPlateau() { document.getElementById('money-layer').innerHTML = ""; game.userRendu = 0; }
    function addRendu(m) { game.userRendu += m.v; spawn(m); }

    function buildDrawer() {
        MONNAIE.forEach((m, i) => {
            const b = document.createElement('button');
            b.className = `money-btn ${m.c}`; b.innerText = m.n;
            b.onclick = () => addRendu(m);
            let row = m.t === 'm-billet' ? (i < 3 ? 'row-b1' : 'row-b2') : 'row-p';
            document.getElementById(row).appendChild(b);
        });
    }

    buildDrawer(); init();
</script>
</body>
</html>
